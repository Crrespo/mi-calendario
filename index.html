<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Dayflow"/>
<meta name="theme-color" content="#0f0f0f"/>
<link rel="manifest" href="manifest.json"/>
<title>Dayflow</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#222;--surface3:#2a2a2a;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--border3:rgba(255,255,255,0.2);
  --text:#f0f0f0;--text2:#999;--text3:#555;--text4:#333;
  --accent:#c8f060;--accent2:rgba(200,240,96,0.15);--accent3:rgba(200,240,96,0.08);
  --holiday:#f87171;--holiday2:rgba(248,113,113,0.15);
  --restday:#60a5fa;--restday2:rgba(96,165,250,0.15);
  --radius:16px;--radius-sm:11px;--radius-xs:7px;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
}
.theme-purple{--accent:#c084fc;--accent2:rgba(192,132,252,0.15);--accent3:rgba(192,132,252,0.08);}
.theme-blue{--accent:#60a5fa;--accent2:rgba(96,165,250,0.15);--accent3:rgba(96,165,250,0.08);}
.theme-orange{--accent:#fb923c;--accent2:rgba(251,146,60,0.15);--accent3:rgba(251,146,60,0.08);}
.theme-pink{--accent:#f472b6;--accent2:rgba(244,114,182,0.15);--accent3:rgba(244,114,182,0.08);}
.theme-teal{--accent:#2dd4bf;--accent2:rgba(45,212,191,0.15);--accent3:rgba(45,212,191,0.08);}
.theme-red{--accent:#f87171;--accent2:rgba(248,113,113,0.15);--accent3:rgba(248,113,113,0.08);}
.light-mode{--bg:#f4f4ef;--surface:#fff;--surface2:#ebebE5;--surface3:#e0e0d8;--border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.13);--border3:rgba(0,0,0,0.2);--text:#111;--text2:#666;--text3:#aaa;--text4:#ccc;}
.light-mode .theme-purple{--accent:#7c3aed;}.light-mode .theme-blue{--accent:#2563eb;}.light-mode .theme-orange{--accent:#ea580c;}.light-mode .theme-pink{--accent:#db2777;}.light-mode .theme-teal{--accent:#0d9488;}.light-mode .theme-red{--accent:#dc2626;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden;}
.overlay{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;background:var(--bg);}
.overlay.hidden{display:none;}
/* Language */
.lang-logo{font-family:'DM Mono',monospace;font-size:34px;font-weight:500;color:var(--accent);margin-bottom:8px;}
.lang-sub{font-size:15px;color:var(--text2);margin-bottom:36px;}
.lang-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:360px;}
.lang-btn{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:16px 18px;text-align:left;cursor:pointer;}
.lang-btn .lang-name{font-size:16px;font-weight:500;color:var(--text);display:block;}
.lang-btn .lang-native{font-size:13px;color:var(--text2);display:block;margin-top:2px;}
.lang-btn.selected{border-color:var(--accent);background:var(--accent2);}
/* Tutorial */
.tut-slides{flex:1;position:relative;overflow:hidden;}
.tut-slide{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px;opacity:0;transform:translateX(60px);transition:all 0.4s cubic-bezier(.4,0,.2,1);pointer-events:none;}
.tut-slide.active{opacity:1;transform:translateX(0);pointer-events:all;}
.tut-slide.prev{opacity:0;transform:translateX(-60px);}
.tut-icon{font-size:60px;margin-bottom:22px;}
.tut-title{font-size:24px;font-weight:500;text-align:center;margin-bottom:12px;line-height:1.3;}
.tut-desc{font-size:16px;color:var(--text2);text-align:center;line-height:1.75;max-width:300px;}
.tut-preview{margin-top:24px;background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius);padding:16px;width:100%;max-width:320px;}
.tut-preview-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--border);}
.tut-preview-row:last-child{border-bottom:none;}
.tut-check{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;}
.tut-check.done{background:var(--accent);border-color:var(--accent);}
.tut-txt{font-size:15px;color:var(--text2);}
.color-swatches{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:22px;}
.swatch{width:50px;height:50px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform 0.15s;}
.swatch.sel{border-color:var(--text);}
.tut-bar{background:var(--surface);border-top:0.5px solid var(--border);padding:16px 24px;padding-bottom:calc(var(--safe-bot) + 16px);}
.tut-dots{display:flex;justify-content:center;gap:7px;margin-bottom:16px;}
.tut-dot{width:7px;height:7px;border-radius:50%;background:var(--border2);transition:all 0.2s;}
.tut-dot.active{width:22px;background:var(--accent);}
.tut-actions{display:flex;gap:10px;align-items:center;}
.tut-back{background:none;border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:14px 16px;font-size:18px;color:var(--text2);cursor:pointer;font-family:'DM Sans',sans-serif;flex-shrink:0;}
.tut-skip{flex:1;background:none;border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:14px;font-size:15px;color:var(--text2);cursor:pointer;font-family:'DM Sans',sans-serif;}
.tut-next{flex:2;background:var(--accent);border:none;border-radius:var(--radius-sm);padding:14px;font-size:15px;font-weight:500;color:#0f0f0f;cursor:pointer;font-family:'DM Sans',sans-serif;}
/* App */
.app{display:flex;flex-direction:column;height:100dvh;max-width:430px;margin:0 auto;}
.header{padding:calc(var(--safe-top) + 14px) 20px 0;}
.header-row{display:flex;align-items:center;justify-content:space-between;}
.app-logo{font-family:'DM Mono',monospace;font-size:16px;font-weight:500;color:var(--accent);letter-spacing:0.05em;}
.header-right{display:flex;align-items:center;gap:8px;}
.today-chip{font-size:14px;color:var(--accent);background:var(--accent2);border:none;border-radius:20px;padding:6px 14px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.score-chip{font-family:'DM Mono',monospace;font-size:14px;color:var(--text2);background:var(--surface);border:0.5px solid var(--border2);border-radius:20px;padding:6px 14px;}
.tabs{display:flex;margin:12px 20px 0;background:var(--surface);border-radius:var(--radius);border:0.5px solid var(--border);overflow:hidden;}
.tab{flex:1;padding:12px 6px;text-align:center;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;border:none;background:none;transition:all 0.2s;font-family:'DM Sans',sans-serif;}
.tab.active{background:var(--surface2);color:var(--text);}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 20px;padding-bottom:calc(var(--safe-bot) + 90px);}
.view{display:none;padding-top:18px;}
.view.active{display:block;}
/* Calendar */
.cal-view-tabs{display:flex;gap:8px;margin-bottom:16px;}
.cv-tab{font-size:14px;color:var(--text2);background:var(--surface);border:0.5px solid var(--border);border-radius:20px;padding:8px 20px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.cv-tab.active{background:var(--accent2);color:var(--accent);border-color:var(--accent);}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.cal-period{font-size:20px;font-weight:500;}
.nav-btn{background:var(--surface);border:0.5px solid var(--border);color:var(--text2);width:38px;height:38px;border-radius:50%;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:16px;}
.cal-dow{text-align:center;font-size:13px;color:var(--text3);padding:0 0 8px;font-family:'DM Mono',monospace;}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:11px;cursor:pointer;border:0.5px solid transparent;transition:background 0.1s;}
.cal-day.empty{cursor:default;}
.cal-day.selected{background:var(--surface2);border-color:var(--border2);}
.cal-day.today .day-num{color:var(--accent);font-weight:500;}
.cal-day.holiday{background:var(--holiday2);}
.cal-day.holiday .day-num{color:var(--holiday);}
.cal-day.restday{background:var(--restday2);}
.cal-day.restday .day-num{color:var(--restday);}
.day-num{font-size:15px;color:var(--text2);line-height:1;}
.day-marker{font-size:9px;margin-top:2px;line-height:1;}
/* Week */
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px;}
.week-col{display:flex;flex-direction:column;align-items:center;gap:4px;}
.wk-dow{font-size:12px;color:var(--text3);font-family:'DM Mono',monospace;padding-bottom:4px;}
.wk-day{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--text2);cursor:pointer;border:0.5px solid transparent;}
.wk-day.today{color:var(--accent);}
.wk-day.selected{background:var(--accent2);border-color:var(--accent);color:var(--accent);}
.wk-day.holiday{background:var(--holiday2);color:var(--holiday);}
.wk-day.restday{background:var(--restday2);color:var(--restday);}
.wk-events{display:flex;flex-direction:column;gap:3px;width:100%;}
.wk-ev{background:var(--accent2);border-radius:4px;padding:3px 5px;font-size:11px;color:var(--accent);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
/* Year */
.year-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;}
.year-month{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 8px;cursor:pointer;}
.year-month:active{background:var(--surface2);}
.ym-name{font-size:13px;font-weight:500;color:var(--text2);margin-bottom:6px;font-family:'DM Mono',monospace;}
.ym-mini{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;}
.ym-d{aspect-ratio:1;border-radius:2px;font-size:7px;display:flex;align-items:center;justify-content:center;color:var(--text3);}
.ym-d.today{background:var(--accent);color:#0f0f0f;border-radius:50%;}
.ym-d.has{background:var(--accent3);}
/* Day section */
.day-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:6px;}
.day-full{font-size:17px;font-weight:500;}
.day-pts{font-family:'DM Mono',monospace;font-size:14px;color:var(--accent);background:var(--accent2);padding:5px 13px;border-radius:20px;}
.day-flags{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.day-flag-btn{font-size:13px;padding:6px 14px;border-radius:20px;border:0.5px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer;font-family:'DM Sans',sans-serif;}
.day-flag-btn.holiday-on{background:var(--holiday2);border-color:var(--holiday);color:var(--holiday);}
.day-flag-btn.restday-on{background:var(--restday2);border-color:var(--restday);color:var(--restday);}
.section-lbl{font-size:12px;letter-spacing:0.1em;color:var(--text3);text-transform:uppercase;font-family:'DM Mono',monospace;margin:16px 0 8px;}
.task-list{display:flex;flex-direction:column;gap:6px;}
.task-item{display:flex;align-items:center;gap:12px;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:14px;cursor:pointer;transition:opacity 0.2s;}
.task-item.done{opacity:0.42;}
.task-item.done .task-text{text-decoration:line-through;}
.check{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.task-item.done .check{background:var(--accent);border-color:var(--accent);}
.ck-mark{display:none;font-size:12px;color:#0f0f0f;font-weight:700;}
.task-item.done .ck-mark{display:block;}
.task-text{font-size:16px;flex:1;line-height:1.4;}
.task-badge{font-size:12px;padding:3px 9px;border-radius:20px;background:var(--accent2);color:var(--accent);font-family:'DM Mono',monospace;flex-shrink:0;}
.task-badge.daily{background:var(--surface2);color:var(--text3);}
.task-del{background:none;border:none;color:var(--text3);font-size:22px;cursor:pointer;padding:0 2px;flex-shrink:0;}
/* Objectives */
.obj-date-strip{display:flex;gap:8px;overflow-x:auto;padding-bottom:14px;scrollbar-width:none;}
.obj-date-strip::-webkit-scrollbar{display:none;}
.date-chip{flex-shrink:0;background:var(--surface);border:0.5px solid var(--border);border-radius:22px;padding:8px 16px;font-size:15px;color:var(--text2);cursor:pointer;white-space:nowrap;}
.date-chip.active{background:var(--accent2);border-color:var(--accent);color:var(--accent);}
.score-bar-wrap{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:16px 18px;margin-bottom:16px;}
.score-bar-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;}
.score-num{font-family:'DM Mono',monospace;font-size:28px;font-weight:500;color:var(--accent);}
.score-label{font-size:15px;color:var(--text2);}
.score-bar{height:7px;background:var(--surface2);border-radius:4px;overflow:hidden;}
.score-fill{height:100%;background:var(--accent);border-radius:4px;transition:width 0.4s cubic-bezier(.4,0,.2,1);}
.obj-item{display:flex;align-items:center;gap:10px;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:6px;transition:opacity 0.2s;}
.obj-item.done{opacity:0.4;}
.obj-item.done .obj-text{text-decoration:line-through;}
.obj-arrows{display:flex;flex-direction:column;gap:1px;flex-shrink:0;}
.arr-btn{background:none;border:0.5px solid var(--border);border-radius:5px;color:var(--text2);font-size:14px;cursor:pointer;line-height:1;padding:3px 6px;font-family:'DM Sans',sans-serif;background:var(--surface2);}
.arr-btn:active{background:var(--accent2);color:var(--accent);}
.arr-btn:disabled{opacity:0.2;cursor:default;}
.obj-check{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.obj-item.done .obj-check{background:var(--accent);border-color:var(--accent);}
.obj-ck-mark{display:none;font-size:12px;color:#0f0f0f;font-weight:700;}
.obj-item.done .obj-ck-mark{display:block;}
.obj-text-wrap{flex:1;min-width:0;}
.obj-text{font-size:15px;line-height:1.4;word-break:break-word;}
.obj-days{font-size:12px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:2px;}
.obj-actions{display:flex;gap:4px;flex-shrink:0;}
.obj-edit-btn,.obj-del-btn{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:4px;}
/* Modal */
.modal-backdrop{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,0.6);display:flex;align-items:flex-end;}
.modal-backdrop.hidden{display:none;}
.modal-sheet{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;padding:24px;padding-bottom:calc(var(--safe-bot) + 24px);width:100%;max-width:430px;margin:0 auto;}
.modal-title{font-size:18px;font-weight:500;margin-bottom:18px;}
.modal-input{width:100%;background:var(--surface2);border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:14px 16px;font-size:16px;color:var(--text);outline:none;font-family:'DM Sans',sans-serif;margin-bottom:14px;}
.modal-label{font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;font-family:'DM Mono',monospace;margin-bottom:10px;}
.days-row{display:flex;gap:8px;margin-bottom:6px;flex-wrap:wrap;}
.day-toggle{width:40px;height:40px;border-radius:50%;border:0.5px solid var(--border2);background:var(--surface2);color:var(--text2);font-size:14px;cursor:pointer;font-family:'DM Mono',monospace;display:flex;align-items:center;justify-content:center;}
.day-toggle.on{background:var(--accent2);border-color:var(--accent);color:var(--accent);}
.deselect-all-btn{font-size:13px;color:var(--text3);background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;margin-bottom:18px;text-decoration:underline;padding:0;}
.modal-actions{display:flex;gap:10px;margin-top:4px;}
.modal-cancel{flex:1;background:none;border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:14px;font-size:15px;color:var(--text2);cursor:pointer;font-family:'DM Sans',sans-serif;}
.modal-save{flex:2;background:var(--accent);border:none;border-radius:var(--radius-sm);padding:14px;font-size:15px;font-weight:500;color:#0f0f0f;cursor:pointer;font-family:'DM Sans',sans-serif;}
/* Settings */
.settings-section{margin-bottom:26px;}
.settings-title{font-size:12px;letter-spacing:0.1em;color:var(--text3);text-transform:uppercase;font-family:'DM Mono',monospace;margin-bottom:10px;}
.settings-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:0.5px solid var(--border);}
.setting-row:last-child{border-bottom:none;}
.setting-name{font-size:16px;}
.setting-btn{background:none;border:none;color:var(--text2);font-size:16px;cursor:pointer;font-family:'DM Sans',sans-serif;text-align:right;}
.color-row{display:flex;gap:12px;flex-wrap:wrap;padding:16px 18px;}
.color-opt{width:38px;height:38px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform 0.15s;}
.color-opt:active{transform:scale(0.88);}
.color-opt.active{border-color:var(--text);}
.lang-select-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 14px;}
.lang-opt{background:var(--surface2);border:0.5px solid var(--border);border-radius:var(--radius-xs);padding:12px 14px;font-size:15px;color:var(--text2);cursor:pointer;text-align:left;font-family:'DM Sans',sans-serif;}
.lang-opt.active{border-color:var(--accent);color:var(--accent);background:var(--accent2);}
.donate-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:var(--accent);border:none;border-radius:var(--radius-sm);padding:18px;font-size:17px;font-weight:500;color:#0f0f0f;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:8px;}
.total-score-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:24px;text-align:center;margin-bottom:16px;}
.ts-num{font-family:'DM Mono',monospace;font-size:44px;font-weight:500;color:var(--accent);}
.ts-lbl{font-size:15px;color:var(--text2);margin-top:4px;}
.ts-sub{font-size:13px;color:var(--text3);margin-top:2px;}
/* Add bar */
.add-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--bg);border-top:0.5px solid var(--border);padding:12px 20px;padding-bottom:calc(var(--safe-bot) + 12px);display:flex;gap:10px;align-items:center;}
.add-input{flex:1;background:var(--surface);border:0.5px solid var(--border);border-radius:26px;padding:13px 18px;font-size:16px;color:var(--text);outline:none;font-family:'DM Sans',sans-serif;}
.add-input::placeholder{color:var(--text3);}
.add-input:focus{border-color:var(--border2);}
.add-btn{background:var(--accent);border:none;border-radius:50%;width:46px;height:46px;font-size:26px;color:#0f0f0f;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:300;}
.empty-state{text-align:center;padding:32px 0;color:var(--text3);font-size:16px;}
</style>
</head>
<body>

<div class="overlay" id="langScreen">
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:40px 28px;">
    <div class="lang-logo">dayflow</div>
    <div class="lang-sub">Choose your language / Elige tu idioma</div>
    <div class="lang-grid" id="langGrid"></div>
    <button onclick="finishLang()" style="margin-top:28px;background:var(--accent);border:none;border-radius:var(--radius-sm);padding:17px 54px;font-size:17px;font-weight:500;color:#0f0f0f;cursor:pointer;font-family:'DM Sans',sans-serif;">
      Continuar / Continue
    </button>
  </div>
</div>

<div class="overlay hidden" id="tutScreen">
  <div class="tut-slides" id="tutSlides"></div>
  <div class="tut-bar">
    <div class="tut-dots" id="tutDots"></div>
    <div class="tut-actions">

    if(i===2)inner+=`<div class="tut-preview">${['Revisar correos','Planificar el día','Hacer ejercicio'].map((t,j)=>`<div class="tut-preview-row"><div class="tut-check${j<2?' done':''}"></div><div class="tut-txt" style="${j<2?'text-decoration:line-through;opacity:0.5':''}">${t}</div></div>`).join('')}</div>`;
    if(i===3)inner+=`<div class="color-swatches" id="tutSwatches">${THEMES_LIST.map(t=>`<div class="swatch${t===tutTmpTheme?' sel':''}" style="background:${THEME_COLORS[t]};" onclick="tutPickTheme('${t}')"></div>`).join('')}</div><div style="margin-top:16px;background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:14px 18px;width:100%;max-width:280px;"><div style="display:flex;align-items:center;gap:10px;"><div style="width:24px;height:24px;border-radius:50%;background:var(--accent);"></div><span style="font-size:16px;">Dayflow</span><span style="margin-left:auto;font-size:13px;padding:4px 10px;background:var(--accent2);color:var(--accent);border-radius:10px;">activo</span></div></div>`;
    if(i===4)inner+=`<div class="tut-preview"><div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;"><span style="font-family:'DM Mono',monospace;font-size:28px;color:var(--accent);">75</span><span style="font-size:15px;color:var(--text2);">/ 100 pts</span></div><div style="height:7px;background:var(--surface2);border-radius:4px;"><div style="width:75%;height:100%;background:var(--accent);border-radius:4px;"></div></div><div style="font-size:13px;color:var(--text3);margin-top:10px;">3 de 4 objetivos completados</div></div>`;
    div.innerHTML=inner;container.appendChild(div);
  }
  renderTutDots();updateTutButtons();
}
function tutPickTheme(t){tutTmpTheme=t;setTheme(t,true);document.querySelectorAll('.swatch').forEach((s,i)=>{s.classList.toggle('sel',THEMES_LIST[i]===t);});}
function renderTutDots(){document.getElementById('tutDots').innerHTML=Array.from({length:TUT_COUNT},(_,i)=>`<div class="tut-dot${i===tutSlide?' active':''}"></div>`).join('');}
function updateTutButtons(){
  document.getElementById('tutSkipBtn').textContent=T('skip');
  document.getElementById('tutNextBtn').textContent=tutSlide===TUT_COUNT-1?T('finish'):T('next');
  document.getElementById('tutBackBtn').textContent=T('back');
  document.getElementById('tutBackBtn').style.display=tutSlide===0?'none':'';
  document.getElementById('tutSkipBtn').style.display=tutSlide===TUT_COUNT-1?'none':'';
}
function prevTutSlide(){
  if(tutSlide<=0)return;
  document.getElementById('ts'+tutSlide).classList.remove('active');
  tutSlide--;
  const el=document.getElementById('ts'+tutSlide);el.classList.remove('prev');el.classList.add('active');
  renderTutDots();updateTutButtons();
}
function nextTutSlide(){
  if(tutSlide>=TUT_COUNT-1){finishTutorial();return;}
  document.getElementById('ts'+tutSlide).classList.remove('active');
  document.getElementById('ts'+tutSlide).classList.add('prev');
  tutSlide++;document.getElementById('ts'+tutSlide).classList.add('active');
  renderTutDots();updateTutButtons();
}
function skipTutorial(){finishTutorial();}
function finishTutorial(){themeColor=tutTmpTheme;sv('themeColor',themeColor);sv('tutDone',true);document.getElementById('tutScreen').classList.add('hidden');launchApp();}

// ── LAUNCH ──
function launchApp(){applyTheme();document.getElementById('mainApp').style.display='flex';renderAll();}
function applyTheme(){
  const body=document.body;body.classList.toggle('light-mode',!isDark);
  THEMES_LIST.forEach(t=>body.classList.remove('theme-'+t));
  if(themeColor!=='green')body.classList.add('theme-'+themeColor);
  document.querySelectorAll('.color-opt').forEach(el=>{el.classList.toggle('active',el.id==='co-'+themeColor);});
  const db=document.getElementById('darkModeBtn');if(db)db.textContent=isDark?T('on'):T('off');
  const m=document.querySelector('meta[name="theme-color"]');if(m)m.content=isDark?'#0f0f0f':'#f4f4ef';
}
function setTheme(t,preview=false){themeColor=t;if(!preview)sv('themeColor',t);applyTheme();}
function toggleDark(){isDark=!isDark;sv('isDark',isDark);applyTheme();renderSettings();}

// ── TABS ──
function switchTab(t){
  activeTab=t;
  ['cal','obj','stats','cfg'].forEach(id=>{document.getElementById('tab-'+id).classList.toggle('active',id===t);document.getElementById('view-'+id).classList.toggle('active',id===t);});
  document.getElementById('addBar').style.display=(t==='cfg'||t==='stats')?'none':'flex';
  renderAll();
}
function goToday(){now=new Date();todayKey=fmt(now);selectedDate=todayKey;viewYear=now.getFullYear();viewMonth=now.getMonth();viewWeekStart=getWeekStart(now);if(activeTab!=='cal')switchTab('cal');else renderAll();}

// ── SPECIAL DAYS ──
function toggleSpecialDay(date,type){specialDays[date]=(specialDays[date]===type)?null:type;persist();renderAll();}
function isHoliday(k){return specialDays[k]==='holiday';}
function isRestDay(k){return specialDays[k]==='restday';}

// ── CALENDAR ──
function setCalView(v){calView=v;sv('calView',v);['week','month','year'].forEach(x=>document.getElementById('cvt-'+x).classList.toggle('active',x===v));renderCal();}
function calNav(d){
  if(calView==='month'){viewMonth+=d;if(viewMonth>11){viewMonth=0;viewYear++;}if(viewMonth<0){viewMonth=11;viewYear--;}}
  else if(calView==='year'){viewYear+=d;}
  else{const dd=new Date(viewWeekStart);dd.setDate(dd.getDate()+d*7);viewWeekStart=dd;}
  renderCal();
}
function renderCal(){
  document.getElementById('cvt-week').textContent=T('week');document.getElementById('cvt-month').textContent=T('month');document.getElementById('cvt-year').textContent=T('year');
  const lbl=document.getElementById('calPeriodLabel'),body=document.getElementById('calBody');
  if(calView==='month'){lbl.textContent=`${T('months')[viewMonth]} ${viewYear}`;body.innerHTML=renderMonthGrid();}
  else if(calView==='week'){const we=new Date(viewWeekStart);we.setDate(we.getDate()+6);lbl.textContent=`${viewWeekStart.getDate()} ${T('monthsS')[viewWeekStart.getMonth()]} — ${we.getDate()} ${T('monthsS')[we.getMonth()]}`;body.innerHTML=renderWeekGrid();}
  else{lbl.textContent=`${viewYear}`;body.innerHTML=renderYearGrid();}
  renderDaySectionCal();
}
function renderMonthGrid(){
  const dow=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  let h=`<div class="cal-grid">${dow.map(d=>`<div class="cal-dow">${T(d)}</div>`).join('')}`;
  const first=new Date(viewYear,viewMonth,1),startDow=(first.getDay()+6)%7,days=new Date(viewYear,viewMonth+1,0).getDate();
  for(let i=0;i<startDow;i++)h+='<div class="cal-day empty"></div>';
  for(let d=1;d<=days;d++){
    const k=`${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isTod=k===todayKey,isSel=k===selectedDate,hol=isHoliday(k),rest=isRestDay(k);
    const marker=hol?'<div class="day-marker">🎉</div>':rest?'<div class="day-marker">😴</div>':'';
    h+=`<div class="cal-day${isTod?' today':''}${isSel?' selected':''}${hol?' holiday':''}${rest?' restday':''}" onclick="selectDay('${k}')"><div class="day-num">${d}</div>${marker}</div>`;
  }
  return h+'</div>';
}
function renderWeekGrid(){
  const dow=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];let h='<div class="week-grid">';
  for(let i=0;i<7;i++){
    const d=new Date(viewWeekStart);d.setDate(d.getDate()+i);const k=fmt(d);
    const isTod=k===todayKey,isSel=k===selectedDate,hol=isHoliday(k),rest=isRestDay(k);
    const tasks=calTasks[k]||[];
    h+=`<div class="week-col"><div class="wk-dow">${T(dow[i])}</div><div class="wk-day${isTod?' today':''}${isSel?' selected':''}${hol?' holiday':''}${rest?' restday':''}" onclick="selectDay('${k}')">${d.getDate()}</div><div class="wk-events">${tasks.slice(0,2).map(t=>`<div class="wk-ev">${esc(t.text)}</div>`).join('')}</div></div>`;
  }
  return h+'</div>';
}
function renderYearGrid(){
  let h='<div class="year-grid">';
  for(let m=0;m<12;m++){
    const days=new Date(viewYear,m+1,0).getDate(),first=new Date(viewYear,m,1),startDow=(first.getDay()+6)%7;
    let cells='';for(let i=0;i<startDow;i++)cells+='<div class="ym-d"></div>';
    for(let d=1;d<=days;d++){const k=`${viewYear}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;const isTod=k===todayKey,has=(calTasks[k]&&calTasks[k].length);cells+=`<div class="ym-d${isTod?' today':has?' has':''}">${isTod||has?d:''}</div>`;}
    h+=`<div class="year-month" onclick="viewMonth=${m};calView='month';setCalView('month')"><div class="ym-name">${T('monthsS')[m]}</div><div class="ym-mini">${cells}</div></div>`;
  }
  return h+'</div>';
}
function selectDay(k){selectedDate=k;const d=parseKey(k);viewYear=d.getFullYear();viewMonth=d.getMonth();viewWeekStart=getWeekStart(d);renderCal();}
function renderDaySectionCal(){
  const d=parseKey(selectedDate),dow=(d.getDay()+6)%7;
  const label=`${T('daysLong')[dow]}, ${d.getDate()} ${T('monthsS')[d.getMonth()]}`;
  const pts=calcDayScore(selectedDate);
  const hol=isHoliday(selectedDate),rest=isRestDay(selectedDate);
  const specialBadge=hol?`<span style="font-size:13px;padding:4px 10px;background:var(--holiday2);color:var(--holiday);border-radius:20px;"> 🎉 ${T('holiday')}</span>`:rest?`<span style="font-size:13px;padding:4px 10px;background:var(--restday2);color:var(--restday);border-radius:20px;"> 😴 ${T('restday')}</span>`:'';
  const activeObjs=(!rest&&!hol)?objectives.filter(o=>isObjActive(o,selectedDate)):[];
  const calT=calTasks[selectedDate]||[];
  const defHTML=activeObjs.length?`<div class="section-lbl">${T('dailyTasks')}</div><div class="task-list">${activeObjs.map(o=>taskItemHTML('def',o,selectedDate)).join('')}</div>`:'';
  const calHTML=calT.length?`<div class="section-lbl">${T('thisDay')}</div><div class="task-list">${calT.map(t=>taskItemHTML('cal',t,selectedDate)).join('')}</div>`:'';
  document.getElementById('daySectionCal').innerHTML=`
    <div class="day-header"><div><span class="day-full">${label}</span>${specialBadge}</div><span class="day-pts">${pts} pts</span></div>
    <div class="day-flags">
      <button class="day-flag-btn${hol?' holiday-on':''}" onclick="toggleSpecialDay('${selectedDate}','holiday')">${T('markHoliday')}</button>
      <button class="day-flag-btn${rest?' restday-on':''}" onclick="toggleSpecialDay('${selectedDate}','restday')">${T('markRest')}</button>
    </div>
    ${defHTML}${calHTML}
    ${!activeObjs.length&&!calT.length?`<div class="empty-state">${hol||rest?'😌':T('noTasks')}</div>`:''}`;
  document.getElementById('taskInput').placeholder=T('addTask');
}
function taskItemHTML(type,t,date){
  const done=isDone(type,t.id,date);
  const badge=type==='def'?`<span class="task-badge daily">${T('daily')}</span>`:'';
  const del=type==='cal'?`<button class="task-del" onclick="event.stopPropagation();delCalTask('${t.id}','${date}')">×</button>`:'';
  return`<div class="task-item${done?' done':''}" onclick="toggleTask('${type}','${t.id}','${date}')"><div class="check"><span class="ck-mark">✓</span></div><span class="task-text">${esc(t.text)}</span>${badge}${del}</div>`;
}
function addCalTask(){const inp=document.getElementById('taskInput');const text=inp.value.trim();if(!text)return;if(!calTasks[selectedDate])calTasks[selectedDate]=[];calTasks[selectedDate].push({id:'t'+Date.now(),text});inp.value='';persist();renderAll();}
function delCalTask(id,date){if(!calTasks[date])return;calTasks[date]=calTasks[date].filter(t=>t.id!==id);persist();renderAll();}

// ── OBJECTIVES ──
function isObjActive(o,date){const d=parseKey(date);const dow=(d.getDay()+6)%7;return o.days.includes(dow);}
function calcDayScore(date){
  if(isHoliday(date)||isRestDay(date))return 0;
  const active=objectives.filter(o=>isObjActive(o,date));const calT=calTasks[date]||[];const total=active.length+calT.length;
  if(!total)return 0;const ptsEach=100/total;
  const doneCount=active.filter(o=>isDone('def',o.id,date)).length+calT.filter(t=>isDone('cal',t.id,date)).length;
  return Math.round(doneCount*ptsEach);
}
function isDone(type,id,date){return!!completions[`${type}_${id}_${date}`];}
function toggleTask(type,id,date){
  const k=`${type}_${id}_${date}`;completions[k]=!completions[k];
  const pts=calcDayScore(date);const prev=ld('dayScores',{});prev[date]=pts;sv('dayScores',prev);
  totalScore=Object.values(prev).reduce((a,b)=>a+b,0);persist();renderAll();
}

function renderObjStrip(){
  const strip=document.getElementById('objStrip');const chips=[];
  for(let i=-3;i<=7;i++){
    const d=new Date(now);d.setDate(now.getDate()+i);const k=fmt(d);
    // Full date label always — "Hoy" only for today
    const label=i===0?T('today'):`${d.getDate()} ${T('monthsS')[d.getMonth()]}`;
    chips.push(`<div class="date-chip${k===selectedDate?' active':''}" onclick="selectedDate='${k}';renderAll()">${label}</div>`);
  }
  strip.innerHTML=chips.join('');
}

function renderObjList(){
  renderObjStrip();
  const pts=calcDayScore(selectedDate);
  document.getElementById('objScoreNum').textContent=pts;
  document.getElementById('objScoreFill').style.width=pts+'%';
  document.getElementById('objScoreLbl').textContent='/ 100 pts';
  const hol=isHoliday(selectedDate),rest=isRestDay(selectedDate);
  const activeObjs=(!rest&&!hol)?objectives.filter(o=>isObjActive(o,selectedDate)):[];
  const calT=calTasks[selectedDate]||[];
  let html='';
  if(hol||rest){
    html=`<div class="empty-state" style="font-size:32px;padding:20px 0;">${hol?'🎉':'😴'}<br><span style="font-size:16px;margin-top:8px;display:block;">${hol?T('holiday'):T('restday')}</span></div>`;
  } else {
    if(activeObjs.length){
      html+=`<div class="section-lbl">${T('dailyTasks')}</div>`;
      activeObjs.forEach((o,i)=>{
        const done=isDone('def',o.id,selectedDate);
        const daysStr=o.days.length===7?T('daily'):`${o.days.length}d`;
        const isFirst=i===0,isLast=i===activeObjs.length-1;
        html+=`<div class="obj-item${done?' done':''}" id="objitem-${o.id}">
          <div class="obj-arrows">
            <button class="arr-btn" onclick="moveObj('${o.id}',-1)" ${isFirst?'disabled':''}>▲</button>
            <button class="arr-btn" onclick="moveObj('${o.id}',1)" ${isLast?'disabled':''}>▼</button>
          </div>
          <div class="obj-check" onclick="toggleTask('def','${o.id}','${selectedDate}')"><span class="obj-ck-mark">✓</span></div>
          <div class="obj-text-wrap"><div class="obj-text">${esc(o.text)}</div><div class="obj-days">${daysStr}</div></div>
          <div class="obj-actions">
            <button class="obj-edit-btn" onclick="openEditObj('${o.id}')">✎</button>
            <button class="obj-del-btn" onclick="delObj('${o.id}')">×</button>
          </div>
        </div>`;
      });
    }
    if(calT.length){
      html+=`<div class="section-lbl">${T('thisDay')}</div>`;
      calT.forEach(t=>{
        const done=isDone('cal',t.id,selectedDate);
        html+=`<div class="obj-item${done?' done':''}">
          <div class="obj-arrows"><button class="arr-btn" disabled style="visibility:hidden">▲</button><button class="arr-btn" disabled style="visibility:hidden">▼</button></div>
          <div class="obj-check" onclick="toggleTask('cal','${t.id}','${selectedDate}')"><span class="obj-ck-mark">✓</span></div>
          <div class="obj-text-wrap"><div class="obj-text">${esc(t.text)}</div></div>
          <div class="obj-actions"><button class="obj-del-btn" onclick="delCalTask('${t.id}','${selectedDate}');renderAll()">×</button></div>
        </div>`;
      });
    }
    if(!activeObjs.length&&!calT.length)html=`<div class="empty-state">${T('noTasks')}</div>`;
  }
  document.getElementById('objList').innerHTML=html;
  document.getElementById('addObjBtn').textContent=T('addObj');
}

function moveObj(id,dir){
  const idx=objectives.findIndex(o=>o.id===id);if(idx<0)return;
  const newIdx=idx+dir;if(newIdx<0||newIdx>=objectives.length)return;
  const[moved]=objectives.splice(idx,1);objectives.splice(newIdx,0,moved);
  persist();renderAll();
}

function openNewObj(){editingObjId=null;document.getElementById('editModalTitle').textContent=T('newObj');document.getElementById('editModalInput').value='';document.getElementById('editModalInput').placeholder=T('objName');renderEditDays([0,1,2,3,4,5,6]);document.getElementById('editModalDaysLabel').textContent=T('activeDays');document.getElementById('deselectAllBtn').textContent=T('deselectAll');document.getElementById('modalCancelBtn').textContent=T('cancel');document.getElementById('modalSaveBtn').textContent=T('save');document.getElementById('editModal').classList.remove('hidden');}
function openEditObj(id){editingObjId=id;const o=objectives.find(x=>x.id===id);if(!o)return;document.getElementById('editModalTitle').textContent=T('editObj');document.getElementById('editModalInput').value=o.text;document.getElementById('editModalInput').placeholder=T('objName');renderEditDays(o.days);document.getElementById('editModalDaysLabel').textContent=T('activeDays');document.getElementById('deselectAllBtn').textContent=T('deselectAll');document.getElementById('modalCancelBtn').textContent=T('cancel');document.getElementById('modalSaveBtn').textContent=T('save');document.getElementById('editModal').classList.remove('hidden');}
function renderEditDays(active){const dow=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];document.getElementById('editModalDays').innerHTML=dow.map((d,i)=>`<button class="day-toggle${active.includes(i)?' on':''}" onclick="toggleEditDay(${i})">${T(d)}</button>`).join('');}
function toggleEditDay(i){document.querySelectorAll('.day-toggle')[i].classList.toggle('on');}
function deselectAllDays(){document.querySelectorAll('.day-toggle').forEach(b=>b.classList.remove('on'));}
function closeEditModal(){document.getElementById('editModal').classList.add('hidden');editingObjId=null;}
function saveEditModal(){const text=document.getElementById('editModalInput').value.trim();if(!text){closeEditModal();return;}const days=[...document.querySelectorAll('.day-toggle')].map((b,i)=>b.classList.contains('on')?i:-1).filter(x=>x>=0);if(editingObjId){const o=objectives.find(x=>x.id===editingObjId);if(o){o.text=text;o.days=days.length?days:[0,1,2,3,4,5,6];}}else{objectives.push({id:'o'+Date.now(),text,days:days.length?days:[0,1,2,3,4,5,6]});}closeEditModal();persist();renderAll();}
function delObj(id){objectives=objectives.filter(o=>o.id!==id);persist();renderAll();}

// ── STATS ──
function renderStats(){
  document.getElementById('totalScoreNum').textContent=totalScore;document.getElementById('totalScoreLbl').textContent=T('totalPoints');document.getElementById('totalScoreSub').textContent=T('accumulated');
  const dayScores=ld('dayScores',{});const days=[];for(let i=29;i>=0;i--){const d=new Date(now);d.setDate(now.getDate()-i);days.push(fmt(d));}
  const last30=days.map(k=>({date:k,pts:dayScores[k]||0}));const sum30=last30.reduce((a,b)=>a+b.pts,0);const avgPts=Math.round(sum30/30);const maxPts=Math.max(...last30.map(x=>x.pts),1);
  document.getElementById('statsGrid').innerHTML=`<div style="background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px;"><div style="display:flex;gap:14px;margin-bottom:18px;"><div style="flex:1;text-align:center;"><div style="font-family:'DM Mono',monospace;font-size:24px;color:var(--accent);">${sum30}</div><div style="font-size:13px;color:var(--text2);margin-top:3px;">Últimos 30d</div></div><div style="width:0.5px;background:var(--border);"></div><div style="flex:1;text-align:center;"><div style="font-family:'DM Mono',monospace;font-size:24px;color:var(--accent);">${avgPts}</div><div style="font-size:13px;color:var(--text2);margin-top:3px;">Promedio/día</div></div></div><div style="display:flex;align-items:flex-end;gap:3px;height:64px;">${last30.slice(-14).map(x=>{const h=Math.max(4,Math.round((x.pts/maxPts)*60));const isToday=x.date===todayKey;return`<div style="flex:1;height:${h}px;background:${isToday?'var(--accent)':'var(--accent2)'};border-radius:3px 3px 0 0;"></div>`;}).join('')}</div><div style="font-size:11px;color:var(--text3);text-align:center;margin-top:8px;font-family:'DM Mono',monospace;">Últimos 14 días</div></div>`;
}

// ── SETTINGS ──
function renderSettings(){
  document.getElementById('cfgTitleAppearance').textContent=T('appearance');document.getElementById('cfgDarkMode').textContent=T('darkMode');document.getElementById('darkModeBtn').textContent=isDark?T('on'):T('off');document.getElementById('cfgAccentColor').textContent=T('accentColor');document.getElementById('cfgTitleLanguage').textContent=T('language');document.getElementById('cfgResetScore').textContent=T('resetScore');document.getElementById('cfgResetBtn').textContent=T('reset');document.getElementById('cfgTitleSupport').textContent=T('support');document.getElementById('donateBtnText').textContent=T('donate');document.getElementById('donateSubText').textContent=T('donateSub');
  document.getElementById('settingsLangGrid').innerHTML=Object.keys(LANGS).map(k=>`<button class="lang-opt${lang===k?' active':''}" onclick="changeLang('${k}')">${LANGS[k].name}</button>`).join('');
}
function changeLang(l){lang=l;sv('lang',l);initObjTexts();renderAll();}
function confirmReset(){if(confirm('¿Reiniciar todos los puntos?')){totalScore=0;sv('totalScore',0);sv('dayScores',{});completions={};sv('completions',{});renderAll();}}
function openDonate(){window.open('https://www.paypal.com/paypalme','_blank');}

// ── RENDER ALL ──
function renderAll(){
  applyTheme();
  const pts=calcDayScore(todayKey);document.getElementById('headerScore').textContent=`${pts} pts`;document.getElementById('todayChipBtn').textContent=T('today');
  document.getElementById('tab-cal').textContent=T('calendar');document.getElementById('tab-obj').textContent=T('objectives');document.getElementById('tab-stats').textContent=T('points');document.getElementById('tab-cfg').textContent=T('settings');
  if(activeTab==='cal')renderCal();else if(activeTab==='obj')renderObjList();else if(activeTab==='stats')renderStats();else if(activeTab==='cfg')renderSettings();
}

if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));}

(function init(){
  applyTheme();
  const firstTime=!ld('tutDone',false),hasLang=ld('lang',null);
  if(!hasLang||firstTime){renderLangScreen();document.getElementById('langScreen').classList.remove('hidden');}
  else{document.getElementById('langScreen').classList.add('hidden');launchApp();}
})();
</script>
