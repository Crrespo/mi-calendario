<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Dayflow"/>
<meta name="theme-color" content="#0f0f0f"/>
<link rel="manifest" href="manifest.json"/>
<title>Dayflow</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#222;--surface3:#2a2a2a;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--border3:rgba(255,255,255,0.2);
  --text:#f0f0f0;--text2:#999;--text3:#555;--text4:#333;
  --accent:#c8f060;--accent2:rgba(200,240,96,0.15);--accent3:rgba(200,240,96,0.08);
  --radius:14px;--radius-sm:9px;--radius-xs:6px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
.theme-purple{--accent:#c084fc;--accent2:rgba(192,132,252,0.15);--accent3:rgba(192,132,252,0.08);}
.theme-blue{--accent:#60a5fa;--accent2:rgba(96,165,250,0.15);--accent3:rgba(96,165,250,0.08);}
.theme-orange{--accent:#fb923c;--accent2:rgba(251,146,60,0.15);--accent3:rgba(251,146,60,0.08);}
.theme-pink{--accent:#f472b6;--accent2:rgba(244,114,182,0.15);--accent3:rgba(244,114,182,0.08);}
.theme-teal{--accent:#2dd4bf;--accent2:rgba(45,212,191,0.15);--accent3:rgba(45,212,191,0.08);}
.theme-red{--accent:#f87171;--accent2:rgba(248,113,113,0.15);--accent3:rgba(248,113,113,0.08);}
.light-mode{
  --bg:#f4f4ef;--surface:#fff;--surface2:#ebebE5;--surface3:#e0e0d8;
  --border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.13);--border3:rgba(0,0,0,0.2);
  --text:#111;--text2:#666;--text3:#aaa;--text4:#ccc;
}
.light-mode .theme-purple{--accent:#7c3aed;}
.light-mode .theme-blue{--accent:#2563eb;}
.light-mode .theme-orange{--accent:#ea580c;}
.light-mode .theme-pink{--accent:#db2777;}
.light-mode .theme-teal{--accent:#0d9488;}
.light-mode .theme-red{--accent:#dc2626;}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden;}

/* ── OVERLAYS ── */
.overlay{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;background:var(--bg);}
.overlay.hidden{display:none;}

/* Language screen */
.lang-screen{align-items:center;justify-content:center;gap:0;padding:40px 32px;}
.lang-logo{font-family:'DM Mono',monospace;font-size:28px;font-weight:500;color:var(--accent);margin-bottom:6px;}
.lang-sub{font-size:13px;color:var(--text2);margin-bottom:40px;}
.lang-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:340px;}
.lang-btn{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:14px 16px;text-align:left;cursor:pointer;transition:all 0.15s;}
.lang-btn:active{background:var(--surface2);}
.lang-btn .lang-name{font-size:14px;font-weight:500;color:var(--text);display:block;}
.lang-btn .lang-native{font-size:12px;color:var(--text2);display:block;margin-top:2px;}
.lang-btn.selected{border-color:var(--accent);background:var(--accent2);}

/* Tutorial */
.tutorial-screen{justify-content:flex-end;padding-bottom:0;}
.tut-slides{flex:1;position:relative;overflow:hidden;}
.tut-slide{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px;opacity:0;transform:translateX(60px);transition:all 0.4s cubic-bezier(.4,0,.2,1);pointer-events:none;}
.tut-slide.active{opacity:1;transform:translateX(0);pointer-events:all;}
.tut-slide.prev{opacity:0;transform:translateX(-60px);}
.tut-icon{font-size:56px;margin-bottom:20px;}
.tut-title{font-size:22px;font-weight:500;text-align:center;margin-bottom:10px;line-height:1.3;}
.tut-desc{font-size:14px;color:var(--text2);text-align:center;line-height:1.7;max-width:300px;}
.tut-preview{margin-top:24px;background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius);padding:16px;width:100%;max-width:320px;}
.tut-preview-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--border);}
.tut-preview-row:last-child{border-bottom:none;}
.tut-check{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;}
.tut-check.done{background:var(--accent);border-color:var(--accent);}
.tut-txt{font-size:13px;color:var(--text2);}
.color-swatches{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:20px;}
.swatch{width:44px;height:44px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform 0.15s;}
.swatch:active{transform:scale(0.9);}
.swatch.sel{border-color:var(--text);}
.tut-bar{background:var(--surface);border-top:0.5px solid var(--border);padding:16px 24px;padding-bottom:calc(var(--safe-bot) + 16px);}
.tut-dots{display:flex;justify-content:center;gap:6px;margin-bottom:16px;}
.tut-dot{width:6px;height:6px;border-radius:50%;background:var(--border2);transition:all 0.2s;}
.tut-dot.active{width:20px;background:var(--accent);}
.tut-actions{display:flex;gap:10px;}
.tut-skip{flex:1;background:none;border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:13px;font-size:14px;color:var(--text2);cursor:pointer;font-family:'DM Sans',sans-serif;}
.tut-next{flex:2;background:var(--accent);border:none;border-radius:var(--radius-sm);padding:13px;font-size:14px;font-weight:500;color:#0f0f0f;cursor:pointer;font-family:'DM Sans',sans-serif;}

/* ── MAIN APP ── */
.app{display:flex;flex-direction:column;height:100dvh;max-width:430px;margin:0 auto;}
.header{padding:calc(var(--safe-top) + 14px) 20px 0;}
.header-row{display:flex;align-items:center;justify-content:space-between;}
.app-logo{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:var(--accent);letter-spacing:0.05em;}
.header-right{display:flex;align-items:center;gap:8px;}
.today-chip{font-size:11px;color:var(--accent);background:var(--accent2);border:none;border-radius:20px;padding:4px 11px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.score-chip{font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);background:var(--surface);border:0.5px solid var(--border2);border-radius:20px;padding:4px 11px;}

.tabs{display:flex;margin:12px 20px 0;background:var(--surface);border-radius:var(--radius);border:0.5px solid var(--border);overflow:hidden;}
.tab{flex:1;padding:10px 6px;text-align:center;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;border:none;background:none;transition:all 0.2s;font-family:'DM Sans',sans-serif;}
.tab.active{background:var(--surface2);color:var(--text);}

.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 20px;padding-bottom:calc(var(--safe-bot) + 84px);}
.view{display:none;padding-top:16px;}
.view.active{display:block;}

/* ── CALENDAR ── */
.cal-view-tabs{display:flex;gap:6px;margin-bottom:14px;}
.cv-tab{font-size:12px;color:var(--text2);background:var(--surface);border:0.5px solid var(--border);border-radius:20px;padding:5px 14px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.cv-tab.active{background:var(--accent2);color:var(--accent);border-color:var(--accent);}

.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.cal-period{font-size:17px;font-weight:500;}
.nav-btn{background:var(--surface);border:0.5px solid var(--border);color:var(--text2);width:32px;height:32px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;}

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:16px;}
.cal-dow{text-align:center;font-size:10px;color:var(--text3);padding:0 0 7px;font-family:'DM Mono',monospace;}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:5px;border-radius:9px;cursor:pointer;border:0.5px solid transparent;transition:background 0.1s;}
.cal-day.empty{cursor:default;}
.cal-day.selected{background:var(--surface2);border-color:var(--border2);}
.cal-day.today .day-num{color:var(--accent);font-weight:500;}
.day-num{font-size:12px;color:var(--text2);line-height:1;}
.day-pip{width:4px;height:4px;border-radius:50%;background:var(--text4);margin-top:3px;}
.day-pip.on{background:var(--accent);}

/* Week view */
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px;}
.week-col{display:flex;flex-direction:column;align-items:center;gap:4px;}
.wk-dow{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;padding-bottom:4px;}
.wk-day{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text2);cursor:pointer;border:0.5px solid transparent;}
.wk-day.today{color:var(--accent);}
.wk-day.selected{background:var(--accent2);border-color:var(--accent);color:var(--accent);}
.wk-events{display:flex;flex-direction:column;gap:3px;width:100%;}
.wk-ev{background:var(--accent2);border-radius:4px;padding:3px 5px;font-size:10px;color:var(--accent);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}

/* Year view */
.year-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;}
.year-month{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 8px;cursor:pointer;}
.year-month:active{background:var(--surface2);}
.ym-name{font-size:11px;font-weight:500;color:var(--text2);margin-bottom:6px;font-family:'DM Mono',monospace;}
.ym-mini{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;}
.ym-d{aspect-ratio:1;border-radius:2px;font-size:7px;display:flex;align-items:center;justify-content:center;color:var(--text3);}
.ym-d.today{background:var(--accent);color:#0f0f0f;border-radius:50%;}
.ym-d.has{background:var(--accent3);}

.day-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.day-full{font-size:14px;font-weight:500;}
.day-pts{font-family:'DM Mono',monospace;font-size:12px;color:var(--accent);background:var(--accent2);padding:3px 10px;border-radius:20px;}

.section-lbl{font-size:10px;letter-spacing:0.1em;color:var(--text3);text-transform:uppercase;font-family:'DM Mono',monospace;margin:14px 0 7px;}

.task-list{display:flex;flex-direction:column;gap:5px;}
.task-item{display:flex;align-items:center;gap:10px;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:11px 12px;cursor:pointer;transition:opacity 0.2s;}
.task-item.done{opacity:0.42;}
.task-item.done .task-text{text-decoration:line-through;}
.check{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.task-item.done .check{background:var(--accent);border-color:var(--accent);}
.ck-mark{display:none;font-size:10px;color:#0f0f0f;font-weight:700;}
.task-item.done .ck-mark{display:block;}
.task-text{font-size:14px;flex:1;line-height:1.4;}
.task-badge{font-size:10px;padding:2px 7px;border-radius:20px;background:var(--accent2);color:var(--accent);font-family:'DM Mono',monospace;flex-shrink:0;}
.task-badge.daily{background:var(--surface2);color:var(--text3);}
.task-del{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:0 2px;flex-shrink:0;}

/* ── OBJECTIVES ── */
.obj-date-strip{display:flex;gap:6px;overflow-x:auto;padding-bottom:12px;scrollbar-width:none;}
.obj-date-strip::-webkit-scrollbar{display:none;}
.date-chip{flex-shrink:0;background:var(--surface);border:0.5px solid var(--border);border-radius:22px;padding:6px 14px;font-size:12px;color:var(--text2);cursor:pointer;}
.date-chip.active{background:var(--accent2);border-color:var(--accent);color:var(--accent);}

.score-bar-wrap{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:14px;}
.score-bar-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
.score-num{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;color:var(--accent);}
.score-label{font-size:12px;color:var(--text2);}
.score-bar{height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;}
.score-fill{height:100%;background:var(--accent);border-radius:3px;transition:width 0.4s cubic-bezier(.4,0,.2,1);}

/* Objective items with drag */
.obj-item{display:flex;align-items:center;gap:10px;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:5px;transition:opacity 0.2s;}
.obj-item.done{opacity:0.4;}
.obj-item.done .obj-text{text-decoration:line-through;}
.obj-item.dragging{opacity:0.3;}
.drag-handle{color:var(--text3);font-size:16px;cursor:grab;flex-shrink:0;touch-action:none;user-select:none;}
.obj-check{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.obj-item.done .obj-check{background:var(--accent);border-color:var(--accent);}
.obj-ck-mark{display:none;font-size:10px;color:#0f0f0f;font-weight:700;}
.obj-item.done .obj-ck-mark{display:block;}
.obj-text-wrap{flex:1;min-width:0;}
.obj-text{font-size:14px;line-height:1.4;word-break:break-word;}
.obj-days{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:1px;}
.obj-actions{display:flex;gap:4px;flex-shrink:0;}
.obj-edit-btn,.obj-del-btn{background:none;border:none;color:var(--text3);font-size:14px;cursor:pointer;padding:3px;}

/* Edit modal */
.modal-backdrop{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,0.6);display:flex;align-items:flex-end;}
.modal-backdrop.hidden{display:none;}
.modal-sheet{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;padding:20px;padding-bottom:calc(var(--safe-bot) + 20px);width:100%;max-width:430px;margin:0 auto;}
.modal-title{font-size:15px;font-weight:500;margin-bottom:16px;}
.modal-input{width:100%;background:var(--surface2);border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:11px 14px;font-size:14px;color:var(--text);outline:none;font-family:'DM Sans',sans-serif;margin-bottom:12px;}
.modal-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;font-family:'DM Mono',monospace;margin-bottom:8px;}
.days-row{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
.day-toggle{width:36px;height:36px;border-radius:50%;border:0.5px solid var(--border2);background:var(--surface2);color:var(--text2);font-size:12px;cursor:pointer;font-family:'DM Mono',monospace;display:flex;align-items:center;justify-content:center;}
.day-toggle.on{background:var(--accent2);border-color:var(--accent);color:var(--accent);}
.modal-actions{display:flex;gap:8px;}
.modal-cancel{flex:1;background:none;border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:12px;font-size:14px;color:var(--text2);cursor:pointer;font-family:'DM Sans',sans-serif;}
.modal-save{flex:2;background:var(--accent);border:none;border-radius:var(--radius-sm);padding:12px;font-size:14px;font-weight:500;color:#0f0f0f;cursor:pointer;font-family:'DM Sans',sans-serif;}

/* ── SETTINGS ── */
.settings-section{margin-bottom:24px;}
.settings-title{font-size:10px;letter-spacing:0.1em;color:var(--text3);text-transform:uppercase;font-family:'DM Mono',monospace;margin-bottom:10px;}
.settings-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:0.5px solid var(--border);}
.setting-row:last-child{border-bottom:none;}
.setting-name{font-size:14px;}
.setting-val{font-size:13px;color:var(--text2);}
.setting-btn{background:none;border:none;color:var(--text2);font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif;text-align:right;}

.color-row{display:flex;gap:10px;flex-wrap:wrap;padding:14px 16px;}
.color-opt{width:34px;height:34px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform 0.15s;}
.color-opt:active{transform:scale(0.88);}
.color-opt.active{border-color:var(--text);}

.lang-select-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:10px 12px;}
.lang-opt{background:var(--surface2);border:0.5px solid var(--border);border-radius:var(--radius-xs);padding:9px 12px;font-size:13px;color:var(--text2);cursor:pointer;text-align:left;font-family:'DM Sans',sans-serif;}
.lang-opt.active{border-color:var(--accent);color:var(--accent);background:var(--accent2);}

.donate-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:var(--accent);border:none;border-radius:var(--radius-sm);padding:15px;font-size:15px;font-weight:500;color:#0f0f0f;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:8px;}

.total-score-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:20px;text-align:center;margin-bottom:14px;}
.ts-num{font-family:'DM Mono',monospace;font-size:36px;font-weight:500;color:var(--accent);}
.ts-lbl{font-size:12px;color:var(--text2);margin-top:4px;}
.ts-sub{font-size:11px;color:var(--text3);margin-top:2px;}

/* ── ADD BAR ── */
.add-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--bg);border-top:0.5px solid var(--border);padding:10px 20px;padding-bottom:calc(var(--safe-bot) + 10px);display:flex;gap:8px;align-items:center;}
.add-input{flex:1;background:var(--surface);border:0.5px solid var(--border);border-radius:22px;padding:10px 16px;font-size:14px;color:var(--text);outline:none;font-family:'DM Sans',sans-serif;}
.add-input::placeholder{color:var(--text3);}
.add-input:focus{border-color:var(--border2);}
.add-btn{background:var(--accent);border:none;border-radius:50%;width:40px;height:40px;font-size:22px;color:#0f0f0f;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:300;}

.empty-state{text-align:center;padding:28px 0;color:var(--text3);font-size:13px;}
</style>
</head>
<body>

<!-- LANGUAGE SCREEN -->
<div class="overlay" id="langScreen">
  <div class="lang-screen" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;">
    <div class="lang-logo">dayflow</div>
    <div class="lang-sub" id="langSubtitle">Choose your language</div>
    <div class="lang-grid" id="langGrid"></div>
    <button onclick="finishLang()" style="margin-top:24px;background:var(--accent);border:none;border-radius:var(--radius-sm);padding:14px 48px;font-size:15px;font-weight:500;color:#0f0f0f;cursor:pointer;font-family:'DM Sans',sans-serif;">
      <span id="langContinueBtn">Continue</span>
    </button>
  </div>
</div>

<!-- TUTORIAL SCREEN -->
<div class="overlay hidden" id="tutScreen">
  <div class="tut-slides" id="tutSlides"></div>
  <div class="tut-bar">
    <div class="tut-dots" id="tutDots"></div>
    <div class="tut-actions">
      <button class="tut-skip" onclick="skipTutorial()" id="tutSkipBtn">Saltar</button>
      <button class="tut-next" onclick="nextTutSlide()" id="tutNextBtn">Siguiente →</button>
    </div>
  </div>
</div>

<!-- EDIT OBJECTIVE MODAL -->
<div class="modal-backdrop hidden" id="editModal">
  <div class="modal-sheet">
    <div class="modal-title" id="editModalTitle">Editar objetivo</div>
    <input class="modal-input" id="editModalInput" placeholder="Nombre de la tarea..."/>
    <div class="modal-label" id="editModalDaysLabel">Días activos</div>
    <div class="days-row" id="editModalDays"></div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeEditModal()">Cancelar</button>
      <button class="modal-save" onclick="saveEditModal()">Guardar</button>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div class="app" id="mainApp" style="display:none;">
  <div class="header">
    <div class="header-row">
      <span class="app-logo">dayflow</span>
      <div class="header-right">

function ld(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}}
function sv(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

let todayKey = fmt(now);
let selectedDate = todayKey;
let viewYear = now.getFullYear();

function detectLang(){
  const nl = (navigator.language||'en').slice(0,2).toLowerCase();
  return LANGS[nl]?nl:'en';
}
function T(k){return (LANGS[lang]&&LANGS[lang].t[k])||k;}
function fmt(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function parseKey(k){const[y,m,d]=k.split('-').map(Number);return new Date(y,m-1,d);}
function getWeekStart(d){const dd=new Date(d);const day=(dd.getDay()+6)%7;dd.setDate(dd.getDate()-day);return dd;}
function persist(){sv('calTasks',calTasks);sv('completions',completions);sv('objectives',objectives);sv('totalScore',totalScore);sv('lang',lang);sv('isDark',isDark);sv('themeColor',themeColor);sv('calView',calView);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function initObjTexts(){
  if(!objectives[0].text) objectives[0].text = lang==='en'?'Check emails':lang==='fr'?'Vérifier les emails':lang==='de'?'E-Mails prüfen':lang==='pt'?'Verificar emails':lang==='it'?'Controlla email':lang==='zh'?'查看邮件':'Revisar correos';

}

function renderLangScreen(){
  document.getElementById('langSubtitle').textContent = 'Choose your language / Elige tu idioma';
  const grid = document.getElementById('langGrid');
  grid.innerHTML = Object.keys(LANGS).map(k=>`
    <button class="lang-btn${lang===k?' selected':''}" onclick="selectLang('${k}')">
      <span class="lang-name">${LANGS[k].name}</span>
      <span class="lang-native">${LANGS[k].native}</span>
    </button>`).join('');
  document.getElementById('langContinueBtn').textContent = 'Continuar / Continue';
}

function selectLang(l){
  lang=l;
  document.querySelectorAll('.lang-btn').forEach((b,i)=>{
    b.classList.toggle('selected', Object.keys(LANGS)[i]===l);
  });
}

function finishLang(){
  sv('lang',lang);
  initObjTexts();
  const firstTime = !ld('tutDone',false);
  document.getElementById('langScreen').classList.add('hidden');
  if(firstTime){
    buildTutorial();
    document.getElementById('tutScreen').classList.remove('hidden');
  } else {
    launchApp();
  }
}

function tutPickTheme(t){
  tutTmpTheme = t;
  setTheme(t, true);
  document.querySelectorAll('.swatch').forEach((s,i)=>{
    s.classList.toggle('sel', THEMES_LIST[i]===t);
  });
}

function renderTutDots(){
  const c = document.getElementById('tutDots');
  c.innerHTML = Array.from({length:TUT_COUNT},(_,i)=>`<div class="tut-dot${i===tutSlide?' active':''}"></div>`).join('');
}

function nextTutSlide(){
  if(tutSlide >= TUT_COUNT-1){ finishTutorial(); return; }
  document.getElementById('ts'+tutSlide).classList.remove('active');
  document.getElementById('ts'+tutSlide).classList.add('prev');
  tutSlide++;
  document.getElementById('ts'+tutSlide).classList.add('active');
  renderTutDots();
  if(tutSlide === TUT_COUNT-1){
    document.getElementById('tutNextBtn').textContent = T('finish');
    document.getElementById('tutSkipBtn').style.display = 'none';
  }
}

function skipTutorial(){ finishTutorial(); }
function finishTutorial(){
  themeColor = tutTmpTheme;
  sv('themeColor',themeColor);
  sv('tutDone',true);
  document.getElementById('tutScreen').classList.add('hidden');
  launchApp();
}

function launchApp(){

function applyTheme(){
  const body = document.body;
  body.classList.toggle('light-mode', !isDark);
  THEMES_LIST.forEach(t=> body.classList.remove('theme-'+t));
  if(themeColor!=='green') body.classList.add('theme-'+themeColor);
  document.querySelectorAll('.color-opt').forEach(el=>{
    el.classList.toggle('active', el.id==='co-'+themeColor);
  });
  document.getElementById('darkModeBtn') && (document.getElementById('darkModeBtn').textContent = isDark?T('on'):T('off'));
  updateMetaTheme();
}

function updateMetaTheme(){
  const m = document.querySelector('meta[name="theme-color"]');
  if(m) m.content = isDark?'#0f0f0f':'#f4f4ef';
}

function setTheme(t, preview=false){
  themeColor = t;
  if(!preview){ sv('themeColor',t); }
  applyTheme();
}

function toggleDark(){
  isDark = !isDark;
  sv('isDark',isDark);
  applyTheme();
}

// ══════════════════════════════════════════
// CALENDAR
// ══════════════════════════════════════════
function setCalView(v){ calView=v; sv('calView',v); ['week','month','year'].forEach(x=>document.getElementById('cvt-'+x).classList.toggle('active',x===v)); renderCal(); }
function calNav(d){
  if(calView==='month'){viewMonth+=d;if(viewMonth>11){viewMonth=0;viewYear++;}if(viewMonth<0){viewMonth=11;viewYear--;}}
  else if(calView==='year'){viewYear+=d;}
  else{const dd=new Date(viewWeekStart);dd.setDate(dd.getDate()+d*7);viewWeekStart=dd;}
  renderCal();
}

function renderCal(){
  const lbl = document.getElementById('calPeriodLabel');
  const body = document.getElementById('calBody');
  if(calView==='month'){
    lbl.textContent=`${T('months')[viewMonth]} ${viewYear}`;
    body.innerHTML=renderMonthGrid();
  } else if(calView==='week'){
    const we=new Date(viewWeekStart);we.setDate(we.getDate()+6);
    lbl.textContent=`${viewWeekStart.getDate()} ${T('monthsS')[viewWeekStart.getMonth()]} — ${we.getDate()} ${T('monthsS')[we.getMonth()]}`;
    body.innerHTML=renderWeekGrid();
  } else {
    lbl.textContent=`${viewYear}`;
    body.innerHTML=renderYearGrid();
  }
  renderDaySectionCal();
}

function renderMonthGrid(){
  const dow=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  let h=`<div class="cal-grid">${dow.map(d=>`<div class="cal-dow">${T(d)}</div>`).join('')}`;
  const first=new Date(viewYear,viewMonth,1);
  const startDow=(first.getDay()+6)%7;
  const days=new Date(viewYear,viewMonth+1,0).getDate();
  for(let i=0;i<startDow;i++) h+='<div class="cal-day empty"></div>';
  for(let d=1;d<=days;d++){
    const k=`${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isTod=k===todayKey,isSel=k===selectedDate;
    const hasTasks=(calTasks[k]&&calTasks[k].length)||objectives.filter(o=>isObjActive(o,k)).length;
    h+=`<div class="cal-day${isTod?' today':''}${isSel?' selected':''}" onclick="selectDay('${k}')">
      <div class="day-num">${d}</div><div class="day-pip${hasTasks?' on':''}"></div></div>`;
  }
  return h+'</div>';
}

function renderWeekGrid(){
  const dow=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  let h='<div class="week-grid">';
  for(let i=0;i<7;i++){
    const d=new Date(viewWeekStart);d.setDate(d.getDate()+i);
    const k=fmt(d);const isTod=k===todayKey,isSel=k===selectedDate;
    const tasks=calTasks[k]||[];
    h+=`<div class="week-col">
      <div class="wk-dow">${T(dow[i])}</div>
      <div class="wk-day${isTod?' today':''}${isSel?' selected':''}" onclick="selectDay('${k}')">${d.getDate()}</div>
      <div class="wk-events">${tasks.slice(0,2).map(t=>`<div class="wk-ev">${esc(t.text)}</div>`).join('')}</div>
    </div>`;
  }
  return h+'</div>';
}

function renderYearGrid(){
  let h='<div class="year-grid">';
  for(let m=0;m<12;m++){
    const days=new Date(viewYear,m+1,0).getDate();
    const first=new Date(viewYear,m,1);
    const startDow=(first.getDay()+6)%7;
    let cells='';
    for(let i=0;i<startDow;i++) cells+='<div class="ym-d"></div>';
    for(let d=1;d<=days;d++){
      const k=`${viewYear}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isTod=k===todayKey;
      const has=(calTasks[k]&&calTasks[k].length);
      cells+=`<div class="ym-d${isTod?' today':has?' has':''}">${isTod||has?d:''}</div>`;
    }
    h+=`<div class="year-month" onclick="viewMonth=${m};calView='month';setCalView('month')">
      <div class="ym-name">${T('monthsS')[m]}</div>
      <div class="ym-mini">${cells}</div></div>`;
  }
  return h+'</div>';
}

function selectDay(k){
  selectedDate=k;
  const d=parseKey(k);viewYear=d.getFullYear();viewMonth=d.getMonth();
  viewWeekStart=getWeekStart(d);
  renderCal();
}

function renderDaySectionCal(){
  const d=parseKey(selectedDate);
  const dow=(d.getDay()+6)%7;
  const label=`${T('daysLong')[dow]}, ${d.getDate()} ${T('monthsS')[d.getMonth()]}`;
  const pts=calcDayScore(selectedDate);
  const el=document.getElementById('daySectionCal');
  const activeObjs=objectives.filter(o=>isObjActive(o,selectedDate));
  const defHTML=activeObjs.length?`<div class="section-lbl">${T('dailyTasks')}</div><div class="task-list">${activeObjs.map(o=>taskItemHTML('def',o,selectedDate)).join('')}</div>`:'';
  const calT=calTasks[selectedDate]||[];
  const calHTML=calT.length?`<div class="section-lbl">${T('thisDay')}</div><div class="task-list">${calT.map(t=>taskItemHTML('cal',t,selectedDate)).join('')}</div>`:'';
  el.innerHTML=`<div class="day-header"><span class="day-full">${label}</span><span class="day-pts">${pts} pts</span></div>${defHTML}${calHTML}${!activeObjs.length&&!calT.length?`<div class="empty-state">${T('noTasks')}</div>`:''}`;
  document.getElementById('taskInput').placeholder=T('addTask');
}

function taskItemHTML(type,t,date){
  const done=isDone(type,t.id,date);
  const badge=type==='def'?`<span class="task-badge daily">${T('daily')}</span>`:'';
  const del=type==='cal'?`<button class="task-del" onclick="event.stopPropagation();delCalTask('${t.id}','${date}')">×</button>`:'';
  return `<div class="task-item${done?' done':''}" onclick="toggleTask('${type}','${t.id}','${date}')">
    <div class="check"><span class="ck-mark">✓</span></div>
    <span class="task-text">${esc(t.text)}</span>${badge}${del}</div>`;
}

function addCalTask(){
  const inp=document.getElementById('taskInput');
  const text=inp.value.trim();if(!text)return;
  if(!calTasks[selectedDate])calTasks[selectedDate]=[];
  calTasks[selectedDate].push({id:'t'+Date.now(),text});
  inp.value='';persist();renderAll();
}

function delCalTask(id,date){
  if(!calTasks[date])return;
  calTasks[date]=calTasks[date].filter(t=>t.id!==id);
  persist();renderAll();
}

// ══════════════════════════════════════════
// OBJECTIVES
// ══════════════════════════════════════════
function isObjActive(o,date){
  const d=parseKey(date);const dow=(d.getDay()+6)%7;return o.days.includes(dow);
}

function calcDayScore(date){
  const active=objectives.filter(o=>isObjActive(o,date));
  const calT=calTasks[date]||[];
  const total=active.length+calT.length;
  if(!total)return 0;
  const ptsEach=100/total;
  const doneCount=active.filter(o=>isDone('def',o.id,date)).length+calT.filter(t=>isDone('cal',t.id,date)).length;
  return Math.round(doneCount*ptsEach);
}

function isDone(type,id,date){return !!completions[`${type}_${id}_${date}`];}

function toggleTask(type,id,date){
  const k=`${type}_${id}_${date}`;
  const wasDone=!!completions[k];
  completions[k]=!wasDone;
  // update total score
  const pts=calcDayScore(date);
  const prev=ld('dayScores',{});
  const prevPts=prev[date]||0;
  prev[date]=pts;
  sv('dayScores',prev);
  // recalc total from all days
  totalScore=Object.values(prev).reduce((a,b)=>a+b,0);
  persist();renderAll();
}

function renderObjStrip(){
  const strip=document.getElementById('objStrip');
  const chips=[];
  for(let i=-3;i<=7;i++){
    const d=new Date(now);d.setDate(now.getDate()+i);const k=fmt(d);
    const label=i===0?(T('today')):i===1?'+1':i===-1?'-1':`${d.getDate()} ${T('monthsS')[d.getMonth()]}`;
    chips.push(`<div class="date-chip${k===selectedDate?' active':''}" onclick="selectedDate='${k}';renderAll()">${label}</div>`);
  }
  strip.innerHTML=chips.join('');
}

function renderObjList(){
  renderObjStrip();
  const pts=calcDayScore(selectedDate);
  document.getElementById('objScoreNum').textContent=pts;
  document.getElementById('objScoreFill').style.width=pts+'%';
  document.getElementById('objScoreLbl').textContent='/ 100 pts';

  const activeObjs=objectives.filter(o=>isObjActive(o,selectedDate));
  const calT=calTasks[selectedDate]||[];
  let html='';
  if(activeObjs.length){
    html+=`<div class="section-lbl">${T('dailyTasks')}</div>`;
    html+=`<div id="objDragList">`;
    html+=activeObjs.map((o,i)=>{
      const done=isDone('def',o.id,selectedDate);
      const daysStr=o.days.length===7?T('daily'):`${o.days.length}d`;
      return `<div class="obj-item${done?' done':''}" id="objitem-${o.id}" draggable="true" ondragstart="dragStart(event,'${o.id}')" ondragover="dragOver(event,'${o.id}')" ondrop="dragDrop(event,'${o.id}')">
        <span class="drag-handle">⠿</span>
        <div class="obj-check" onclick="toggleTask('def','${o.id}','${selectedDate}')"><span class="obj-ck-mark">✓</span></div>
        <div class="obj-text-wrap">
          <div class="obj-text">${esc(o.text)}</div>
          <div class="obj-days">${daysStr}</div>
        </div>
        <div class="obj-actions">
          <button class="obj-edit-btn" onclick="openEditObj('${o.id}')">✎</button>
          <button class="obj-del-btn" onclick="delObj('${o.id}')">×</button>
        </div>
      </div>`;
    }).join('');
    html+='</div>';
  }
  if(calT.length){
    html+=`<div class="section-lbl">${T('thisDay')}</div>`;
    html+=calT.map(t=>{
      const done=isDone('cal',t.id,selectedDate);
      return `<div class="obj-item${done?' done':''}">
        <span class="drag-handle" style="opacity:0.3">⠿</span>
        <div class="obj-check" onclick="toggleTask('cal','${t.id}','${selectedDate}')"><span class="obj-ck-mark">✓</span></div>
        <div class="obj-text-wrap"><div class="obj-text">${esc(t.text)}</div></div>
        <div class="obj-actions"><button class="obj-del-btn" onclick="delCalTask('${t.id}','${selectedDate}');renderAll()">×</button></div>
      </div>`;
    }).join('');
  }
  if(!activeObjs.length&&!calT.length) html=`<div class="empty-state">${T('noTasks')}</div>`;
  document.getElementById('objList').innerHTML=html;
  document.getElementById('addObjBtn').textContent=T('addObj');
}

// Drag to reorder
let dragSrcId=null;
function dragStart(e,id){dragSrcId=id;e.currentTarget.classList.add('dragging');}
function dragOver(e,id){e.preventDefault();}
function dragDrop(e,id){
  e.preventDefault();
  if(!dragSrcId||dragSrcId===id)return;
  const fromIdx=objectives.findIndex(o=>o.id===dragSrcId);
  const toIdx=objectives.findIndex(o=>o.id===id);
  if(fromIdx<0||toIdx<0)return;
  const [moved]=objectives.splice(fromIdx,1);
  objectives.splice(toIdx,0,moved);
  dragSrcId=null;persist();renderAll();
}

  document.getElementById('editModalInput').value=o.text;

function renderEditDays(active){

  const btns=document.querySelectorAll('.day-toggle');

}

function closeEditModal(){document.getElementById('editModal').classList.add('hidden');editingObjId=null;}

function saveEditModal(){
  const text=document.getElementById('editModalInput').value.trim();
  if(!text){closeEditModal();return;}
  const days=[...document.querySelectorAll('.day-toggle')].map((b,i)=>b.classList.contains('on')?i:-1).filter(x=>x>=0);
  if(editingObjId){
    const o=objectives.find(x=>x.id===editingObjId);
    if(o){o.text=text;o.days=days.length?days:[0,1,2,3,4,5,6];}
  } else {
    objectives.push({id:'o'+Date.now(),text,days:days.length?days:[0,1,2,3,4,5,6]});
  }
  closeEditModal();persist();renderAll();
}

function delObj(id){objectives=objectives.filter(o=>o.id!==id);persist();renderAll();}

// STATS
// ══════════════════════════════════════════
function renderStats(){
  document.getElementById('totalScoreNum').textContent=totalScore;
  document.getElementById('totalScoreLbl').textContent=T('totalPoints');
  document.getElementById('totalScoreSub').textContent=T('accumulated');
  const dayScores=ld('dayScores',{});
  // Last 30 days
  const days=[];
  for(let i=29;i>=0;i--){const d=new Date(now);d.setDate(now.getDate()-i);days.push(fmt(d));}
  const last30=days.map(k=>({date:k,pts:dayScores[k]||0}));
  const sum30=last30.reduce((a,b)=>a+b.pts,0);
  const avgPts=Math.round(sum30/30);
  const maxPts=Math.max(...last30.map(x=>x.pts),1);
  let html=`<div style="background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;">
    <div style="display:flex;gap:12px;margin-bottom:16px;">
      <div style="flex:1;text-align:center;">
        <div style="font-family:'DM Mono',monospace;font-size:20px;color:var(--accent);">${sum30}</div>
        <div style="font-size:11px;color:var(--text2);margin-top:3px;">Últimos 30d</div>
      </div>
      <div style="width:0.5px;background:var(--border);"></div>
      <div style="flex:1;text-align:center;">
        <div style="font-family:'DM Mono',monospace;font-size:20px;color:var(--accent);">${avgPts}</div>
        <div style="font-size:11px;color:var(--text2);margin-top:3px;">Promedio/día</div>
      </div>
    </div>
    <div style="display:flex;align-items:flex-end;gap:3px;height:60px;">
      ${last30.slice(-14).map(x=>{
        const h=Math.max(4,Math.round((x.pts/maxPts)*56));
        const isToday=x.date===todayKey;
        return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;">
          <div style="width:100%;height:${h}px;background:${isToday?'var(--accent)':'var(--accent2)'};border-radius:3px 3px 0 0;" title="${x.pts} pts"></div>
        </div>`;
      }).join('')}
    </div>
    <div style="font-size:10px;color:var(--text3);text-align:center;margin-top:6px;font-family:'DM Mono',monospace;">Últimos 14 días</div>
  </div>`;
  document.getElementById('statsGrid').innerHTML=html;
}

function toggleDark(){isDark=!isDark;sv('isDark',isDark);applyTheme();renderSettings();}
function confirmReset(){if(confirm('¿Reiniciar todos los puntos?')){totalScore=0;sv('totalScore',0);sv('dayScores',{});completions={};sv('completions',{});renderAll();}}
function openDonate(){window.open('https://www.paypal.com/paypalme','_blank');}

// ══════════════════════════════════════════
// RENDER ALL
// ══════════════════════════════════════════
function renderAll(){
  applyTheme();
  // header
  const pts=calcDayScore(todayKey);
  document.getElementById('headerScore').textContent=`${pts} pts`;
  document.getElementById('todayChipBtn').textContent=T('today');
  // tabs labels
  document.getElementById('tab-cal').textContent=T('calendar');
  document.getElementById('tab-obj').textContent=T('objectives');
  document.getElementById('tab-stats').textContent=T('points');
  document.getElementById('tab-cfg').textContent=T('settings');

  if(activeTab==='cal') renderCal();
  else if(activeTab==='obj') renderObjList();
  else if(activeTab==='stats') renderStats();
  else if(activeTab==='cfg') renderSettings();
}

// ══════════════════════════════════════════
// SERVICE WORKER
// ══════════════════════════════════════════
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
(function init(){
  applyTheme();
  const firstTime=!ld('tutDone',false);
  const hasLang=ld('lang',null);
  if(!hasLang||firstTime){
    renderLangScreen();
  } else {
    document.getElementById('langScreen').classList.add('hidden');
    launchApp();
  }
})();
</script>
</body>
</html>
